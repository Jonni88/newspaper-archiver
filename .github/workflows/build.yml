name: Build Windows EXE

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Download Tesseract OCR
      run: |
        Invoke-WebRequest -Uri "https://github.com/UB-Mannheim/tesseract/releases/download/v5.4.0.20240606/tesseract-ocr-w64-setup-5.4.0.20240606.exe" -OutFile "tesseract_installer.exe"
        Start-Process -FilePath "tesseract_installer.exe" -ArgumentList "/S" -Wait
        echo "C:\Program Files\Tesseract-OCR" | Out-File -FilePath $env:GITHUB_PATH -Append
    
    - name: Build EXE
      run: |
        pyinstaller --clean --noconfirm `
          --name="NewspaperArchiver" `
          --windowed `
          --add-data="README.md;." `
          --hidden-import=pytesseract `
          --hidden-import=PIL `
          main.py
    
    - name: Copy Tesseract to dist
      run: |
        xcopy "C:\Program Files\Tesseract-OCR" "dist\NewspaperArchiver\tesseract" /E /I /Q
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NewspaperArchiver-Windows
        path: dist/NewspaperArchiver/
    
    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/NewspaperArchiver/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
